services:
  - type: web
    name: amar-ration-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: NID_ENCRYPTION_KEY
        sync: false
      - key: QR_HMAC_SECRET
        sync: false
      - key: IOT_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      # ── SMTP (Gmail) — set these in the Render dashboard ──────────────────
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        value: amar.ration.service@gmail.com
      - key: SMTP_PASS
        sync: false          # Set your Gmail App Password in Render dashboard
      - key: MAIL_FROM
        value: "আমার রেশন <amar.ration.service@gmail.com>"
      - key: BACKEND_PUBLIC_URL
        value: https://amar-ration.onrender.com
